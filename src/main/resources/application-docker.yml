spring:
  config:
    activate:
      on-profile: docker
  security:
    user:
      name: ${ACTUATOR_USER}
      password: ${ACTUATOR_PASSWORD}
      roles: ACTUATOR, MONITORING # Add required roles
  cloud:
    loadbalancer:
      retry:
        enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/dalilak_db?currentSchema=dm_schema}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      schema: dm_schema
  flyway:
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    connect-retries: 10

server:
  port: 8084
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://eureka-server:8761/eureka}
    eureka-service-url-poll-interval-seconds: 5
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 5
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 30
  instance:
    hostname: ${HOSTNAME:dm-service}
    prefer-ip-address: false
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
    status-page-url: http://${eureka.instance.hostname}:${server.port}/api/v1/actuator/info
    health-check-url: http://${eureka.instance.hostname}:${server.port}/api/v1/actuator/health



management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      access: unrestricted

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}
    org.springframework.security: DEBUG
    org.springframework.boot.actuate: INFO

file:
  storage:
    upload:
      location: ${FILE_STORAGE_LOCATION:/app/storage}
      max-file-size: 10MB
      max-total-size: 20MB
      max-files: 5
    document:
      supportedFileTypes:
        - pdf
        - docx
        - jpg
        - jpeg
        - png













