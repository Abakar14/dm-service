spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:prod-postgres}:${DB_PORT:5432}/${DB_NAME:dalilak_db}?currentSchema=dm_schema
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:25}
      minimum-idle: ${DB_MIN_IDLE:10}
      connection-timeout: 30000
      leak-detection-threshold: 60000
  flyway:
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    connect-retries: 15
    init-sql: "SET ROLE '${DB_USER}'"
  jpa:
    show-sql: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8084}
  shutdown: graceful

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVERS}
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME}
    instance-id: ${eureka.instance.appname}:${eureka.instance.hostname}:${server.port}  # Fixed

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9001}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.example.dalilak: INFO


file:
  storage:
    upload:
      location: ${FILE_STORAGE_LOCATION:/app/storage}
      max-file-size: 5MB
      max-total-size: 20MB
      max-files: 5
    document:
      supportedFileTypes:
        - pdf
        - docx
        - jpg
        - jpeg
        - png
        - gif
        - webp
      allowedMimeTypes:
        - application/pdf
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
      allowSvg: false
    cleanup:
      enabled: true
      trashRetentionDays: ${DM_TRASH_RETENTION_DAYS:14}
      cron: ${DM_TRASH_CLEANUP_CRON:0 15 3 * * *}


dm:
  security:
    public-downloads-enabled: false
    public-image-cache-max-age-seconds: 604800
    internal-shared-secret: ${DM_INTERNAL_SHARED_SECRET}
    internal-shared-secret-header: X-Internal-Secret
    enforce-owner-match-for-owner-type-user: true
